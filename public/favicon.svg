<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#4f46e5"/>

  <!-- Owl body -->
  <ellipse cx="16" cy="19" rx="7" ry="8" fill="#fff" opacity="0.95"/>

  <!-- Wings -->
  <ellipse cx="9" cy="20" rx="3.5" ry="5" fill="#c7d2fe" transform="rotate(-10 9 20)"/>
  <ellipse cx="23" cy="20" rx="3.5" ry="5" fill="#c7d2fe" transform="rotate(10 23 20)"/>

  <!-- Head -->
  <circle cx="16" cy="12" r="6" fill="#fff" opacity="0.95"/>

  <!-- Ear tufts -->
  <polygon points="12,7 10,3 14,6" fill="#fff" opacity="0.9"/>
  <polygon points="20,7 22,3 18,6" fill="#fff" opacity="0.9"/>

  <!-- Eyes -->
  <circle cx="13.5" cy="12" r="2.5" fill="#4f46e5"/>
  <circle cx="18.5" cy="12" r="2.5" fill="#4f46e5"/>
  <circle cx="13.5" cy="12" r="1.2" fill="#1e1b4b"/>
  <circle cx="18.5" cy="12" r="1.2" fill="#1e1b4b"/>
  <!-- Eye shine -->
  <circle cx="14.1" cy="11.4" r="0.5" fill="#fff"/>
  <circle cx="19.1" cy="11.4" r="0.5" fill="#fff"/>

  <!-- Beak -->
  <polygon points="16,14 14.5,15.5 17.5,15.5" fill="#fbbf24"/>

  <!-- Belly stripes -->
  <ellipse cx="16" cy="20" rx="4" ry="1.2" fill="#e0e7ff" opacity="0.7"/>
  <ellipse cx="16" cy="22.5" rx="3" ry="1" fill="#e0e7ff" opacity="0.5"/>

  <!-- Feet -->
  <line x1="13" y1="27" x2="11" y2="29" stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="13" y1="27" x2="13" y2="29.5" stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="13" y1="27" x2="15" y2="29" stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="19" y1="27" x2="17" y2="29" stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="19" y1="27" x2="19" y2="29.5" stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="19" y1="27" x2="21" y2="29" stroke="#fbbf24" stroke-width="1.2" stroke-linecap="round"/>
</svg>
